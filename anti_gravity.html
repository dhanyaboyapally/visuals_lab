<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anti-Gravity Particle System</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    video {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1); /* mirror webcam */
      z-index: 1;
      opacity: 0.4;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 2;
    }
    #hud {
      position: absolute;
      top: 30px; left: 40px;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(0,255,255,0.7);
    }
    .hud-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    #modeText {
      font-size: 1.4rem;
      font-weight: bold;
      color: #00ffff;
      transition: color 0.3s;
      margin-bottom: 15px;
    }
    .hud-controls {
      font-size: 0.95rem;
      line-height: 1.6;
      border-left: 3px solid rgba(255,255,255,0.4);
      padding-left: 15px;
      opacity: 0.9;
    }
    .hud-controls span.key {
      color: #ff00ff;
      font-weight: bold;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      z-index: 20;
      text-shadow: 0 0 15px #00ffff;
      transition: opacity 0.5s ease;
      font-weight: bold;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <video id="webcam" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="loading">Initializing MediaPipe AI... Please allow Camera access.</div>
  
  <div id="hud">
    <div class="hud-title">ANTI-GRAVITY PARTICLES</div>
    <div id="modeText">MODE: NORMAL</div>
    <div class="hud-controls">
      Toggle Mode: Press <span class="key">"G"</span><br/><br/>
      <b>Gestures:</b><br/>
      • Open Palm: Create Anti-Gravity Lift Zone<br/>
      • Closed Fist: Strong Gravitational Pull<br/>
      • Fast Movement: Repulsive Force Field<br/>
      • Two Hands: Suspend & Manipulate Space
    </div>
  </div>

  <script>
    /**
     * =============================================================================
     * ANTI-GRAVITY PARTICLE SYSTEM - EXPLANATION & ARCHITECTURE
     * =============================================================================
     * 
     * 1. Detecting Open Palm vs Fist:
     * We calculate the distance from the wrist to the tip of each finger, and 
     * compare it to the distance from the wrist to the base of that same finger 
     * (the MCP joint). If the tip is further from the wrist than the base joint, 
     * the finger is considered "open". 
     * - If 3 or more fingers are open, we classify it as an "Open Palm".
     * - If 1 or fewer fingers are open, we classify it as a "Closed Fist".
     * 
     * 2. Computing Particle Forces:
     * Each particle maintains its own velocity (vx, vy). Every frame, we apply a 
     * vector acceleration (ax, ay) based on gesture rules:
     * - Base Gravity: A constant downward force (+0.2 ay), or upward if in Anti-Gravity Mode.
     * - Open Palm: Calculates radial distance to the particle. If within radius, 
     *   applies a strong negative `ay` proportional to the hand's height mapping.
     * - Closed Fist: Calculates the vector from the particle to the hand and 
     *   applies acceleration along that vector (a gravitational pull attraction).
     * - Two Hands: Calculates an imaginary line segment (axis) between both hands. 
     *   It uses vector dot products to project the particle's position onto this axis, 
     *   pulling it toward the center and constraining its perpendicular bounds, 
     *   effectively "suspending" it inside a capsule-shaped force field.
     * 
     * 3. Preventing Jitter & Instability:
     * - Hand tracking relies on an Exponential Moving Average (EMA) algorithm. 
     *   Instead of using raw landmark coordinates that flutter, we blend the new 
     *   position with the previous position: `smoothedX = prevX + (currX - prevX) * 0.3`.
     * - Particle velocities are capped via maximum limits (25 px/frame) to prevent 
     *   explosive escaping when forces stack up dynamically.
     * - Every particle constantly undergoes a friction multiplier (vx *= 0.96) which 
     *   dampens erratic momentum and ensures physics interactions settle smoothly 
     *   without creating infinite noisy feedback loops.
     * =============================================================================
     */

    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('canvas');
    const ctx = canvasElement.getContext('2d');
    const loading = document.getElementById('loading');
    const modeText = document.getElementById('modeText');

    let w, h;
    let videoTargetWidth, videoTargetHeight, videoOffsetX, videoOffsetY;
    let isAntiGravityMode = false;
    let smoothedHands = [];

    window.addEventListener('resize', alignVideoMapping);

    function alignVideoMapping() {
      w = canvasElement.width = window.innerWidth;
      h = canvasElement.height = window.innerHeight;
      
      if (!videoElement.videoWidth) return;
      const videoRatio = videoElement.videoWidth / videoElement.videoHeight;
      const windowRatio = w / h;
      
      if (windowRatio > videoRatio) {
        videoTargetWidth = w;
        videoTargetHeight = w / videoRatio;
        videoOffsetX = 0;
        videoOffsetY = (h - videoTargetHeight) / 2;
      } else {
        videoTargetHeight = h;
        videoTargetWidth = h * videoRatio;
        videoOffsetX = (w - videoTargetWidth) / 2;
        videoOffsetY = 0;
      }
    }

    // Toggle G key
    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'g') {
        isAntiGravityMode = !isAntiGravityMode;
        modeText.innerText = isAntiGravityMode ? "MODE: ANTIGRAVITY" : "MODE: NORMAL";
        modeText.style.color = isAntiGravityMode ? "#ff00ff" : "#00ffff";
      }
    });

    // Particle Class
    class Particle {
      constructor() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.baseRadius = Math.random() * 2 + 1.5;
        this.color = ['#00ffff', '#8a2be2', '#ff00ff', '#4169e1', '#00ffaa'][Math.floor(Math.random() * 5)];
        this.wanderAngle = Math.random() * Math.PI * 2;
      }

      update(handsData) {
        // Base forces
        let defaultGravity = isAntiGravityMode ? -0.1 : 0.2;
        let ax = 0;
        let ay = defaultGravity;

        let hCount = handsData.length;

        if (hCount === 2) {
          // SUSPEND BETWEEN TWO HANDS
          let h1 = handsData[0];
          let h2 = handsData[1];
          let mx = (h1.x + h2.x) / 2;
          let my = (h1.y + h2.y) / 2;
          let hd = Math.max(1, Math.hypot(h2.x - h1.x, h2.y - h1.y));
          
          let dx = this.x - mx;
          let dy = this.y - my;
          
          let nx = (h2.x - h1.x) / hd;
          let ny = (h2.y - h1.y) / hd;
          
          let proj = dx * nx + dy * ny; // Projection along axis
          let perpX = dx - proj * nx;   // Perpendicular vector
          let perpY = dy - proj * ny;
          let perpDist = Math.hypot(perpX, perpY);
          
          let fieldRadius = 60 + (hd * 0.15); // Stretches/widens dynamically
          let maxProj = hd / 2.2;
          
          // Constrain width (Pull towards center axis line if outside bounds)
          if (perpDist > fieldRadius) {
            let pull = (perpDist - fieldRadius) * 0.04;
            ax -= (perpX / perpDist) * pull;
            ay -= (perpY / perpDist) * pull;
          } else {
            // Gentle turbulence inside the field
            ax += (Math.random() - 0.5) * 0.5;
            ay += (Math.random() - 0.5) * 0.5;
          }
          
          // Constrain length (Pull inwards if outside endpoints)
          if (Math.abs(proj) > maxProj) {
            let pull = (Math.abs(proj) - maxProj) * 0.04;
            let sign = Math.sign(proj);
            ax -= sign * nx * pull;
            ay -= sign * ny * pull;
          }

          // Total suspension
          ay -= defaultGravity; 
          ay += Math.sin(Date.now() * 0.003 + this.x) * 0.1; // Gentle hover

        } else if (hCount === 1) {
          // SINGLE HAND GESTURES
          let hand = handsData[0];
          let dx = this.x - hand.x;
          let dy = this.y - hand.y;
          let d = Math.max(1, Math.hypot(dx, dy));
          
          let speed = hand.speed || 0;
          let handHeightRatio = 1 - (hand.y / h); // Higher is 1.0, lower is 0.0
          let liftPower = 0.15 + Math.max(0, handHeightRatio * 0.4);

          if (speed > 18) {
            // Fast repulsion move
            if (d < 350) {
              let force = (speed * 0.15) * (350 - d) / 350;
              ax += (dx / d) * force;
              ay += (dy / d) * force;
            }
          } else if (hand.isOpen) {
            // Palm anti-gravity
            if (d < 280) {
              let force = (280 - d) / 280;
              ay -= liftPower * force * 1.5; 
              ax += (dx / d) * force * 0.3; // Gentle spray outward
            }
          } else if (hand.isFist) {
            // Fist pull attraction
            if (d < 450) {
              let force = 400 / (d + 20);
              ax -= (dx / d) * force;
              ay -= (dy / d) * force;
            }
          } else {
            // Neutral hover / slight displacement
            if (d < 100) {
              ax += (dx / d) * 0.3;
              ay += (dy / d) * 0.3;
            }
          }
        }

        // Add some organic wander behavior
        this.wanderAngle += (Math.random() - 0.5) * 0.5;
        ax += Math.cos(this.wanderAngle) * 0.05;
        ay += Math.sin(this.wanderAngle) * 0.05;

        // Apply acceleration to velocity
        this.vx += ax;
        this.vy += ay;
        
        // Speed limits (Physics stability)
        const speed = Math.hypot(this.vx, this.vy);
        const maxSpeed = 25; 
        if (speed > maxSpeed) {
          this.vx = (this.vx / speed) * maxSpeed;
          this.vy = (this.vy / speed) * maxSpeed;
        }
        
        // Friction / Damping
        this.vx *= 0.96;
        this.vy *= 0.96;
        
        // Kinematics integration
        this.x += this.vx;
        this.y += this.vy;
        
        // Wrap-around screen bounds
        if (this.y > h + 50) { this.y = -50; this.vy = 0; }
        if (this.y < -50) { this.y = h + 50; this.vy = 0; }
        if (this.x > w + 50) { this.x = -50; this.vx = 0; }
        if (this.x < -50) { this.x = w + 50; this.vx = 0; }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.baseRadius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    const particles = [];
    for(let i=0; i<500; i++) {
        particles.push(new Particle());
    }

    function getDistance(x1, y1, x2, y2) {
      return Math.hypot(x1 - x2, y1 - y2);
    }

    function mapToCanvas(lx, ly) {
      // Maps MediaPipe normalized [0,1] coordinates safely into canvas projection coords
      // Also flips X coordinates because the video tag utilizes transform: scaleX(-1) mirror
      let px = videoOffsetX + lx * videoTargetWidth;
      let py = videoOffsetY + ly * videoTargetHeight;
      return { x: w - px, y: py };
    }

    function processHands(landmarksArray) {
      let currentHands = [];

      landmarksArray.forEach(landmarks => {
        const wrist = mapToCanvas(landmarks[0].x, landmarks[0].y);
        const indexMcp = mapToCanvas(landmarks[5].x, landmarks[5].y);
        const middleMcp = mapToCanvas(landmarks[9].x, landmarks[9].y);
        const ringMcp = mapToCanvas(landmarks[13].x, landmarks[13].y);
        const pinkyMcp = mapToCanvas(landmarks[17].x, landmarks[17].y);

        let cx = (wrist.x + indexMcp.x + pinkyMcp.x) / 3;
        let cy = (wrist.y + indexMcp.y + pinkyMcp.y) / 3;
        
        function getTipInfo(tipIdx, mcpIdx) {
          let t = mapToCanvas(landmarks[tipIdx].x, landmarks[tipIdx].y);
          let m = mapToCanvas(landmarks[mcpIdx].x, landmarks[mcpIdx].y);
          return getDistance(wrist.x, wrist.y, t.x, t.y) > getDistance(wrist.x, wrist.y, m.x, m.y);
        }
        
        let fingersOpen = 0;
        if (getTipInfo(8, 5)) fingersOpen++;
        if (getTipInfo(12, 9)) fingersOpen++;
        if (getTipInfo(16, 13)) fingersOpen++;
        if (getTipInfo(20, 17)) fingersOpen++;
        
        // Thumb simple heuristic
        let tTip = mapToCanvas(landmarks[4].x, landmarks[4].y);
        let tIp = mapToCanvas(landmarks[2].x, landmarks[2].y);
        if(getDistance(wrist.x, wrist.y, tTip.x, tTip.y) > getDistance(wrist.x, wrist.y, tIp.x, tIp.y)) {
           fingersOpen++;
        }

        let isOpen = fingersOpen >= 3;
        let isFist = fingersOpen <= 1;

        currentHands.push({ x: cx, y: cy, isOpen, isFist });
      });

      // Sort by X coordinate to preserve tracking across frames securely for maxNumHands: 2
      currentHands.sort((a,b) => a.x - b.x);
      smoothedHands.sort((a,b) => a.x - b.x);

      let newSmoothed = [];
      for(let i=0; i<currentHands.length; i++) {
        let curr = currentHands[i];
        let prev = smoothedHands[i];
        if (prev) {
          // Exponential Moving Average
          let alpha = 0.3; 
          let sx = prev.x + (curr.x - prev.x) * alpha;
          let sy = prev.y + (curr.y - prev.y) * alpha;
          let vx = sx - prev.x;
          let vy = sy - prev.y;
          let speed = Math.hypot(vx, vy);
          newSmoothed.push({ x: sx, y: sy, vx, vy, speed, isOpen: curr.isOpen, isFist: curr.isFist });
        } else {
          newSmoothed.push({ ...curr, vx: 0, vy: 0, speed: 0 });
        }
      }
      smoothedHands = newSmoothed;
    }

    let isMediaPipeLoaded = false;

    alignVideoMapping(); // Init sizes

    function drawLoop() {
      // Create motion trail effect by drawing slight transparent black overlay
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(0, 0, w, h);
      
      // We use additive blending for that "glow/neon" aesthetic
      ctx.globalCompositeOperation = 'lighter';

      // Draw Force field Auras around Active Hands
      smoothedHands.forEach(h => {
        ctx.beginPath();
        let grad = ctx.createRadialGradient(h.x, h.y, 10, h.x, h.y, 120);
        let maxColorOpac = h.speed > 18 ? '0.3' : '0.15';
        
        let color = h.isFist ? `rgba(255, 50, 100, ${maxColorOpac})`     // Red/Pink for Attract
                  : h.speed > 18 ? `rgba(255, 200, 50, ${maxColorOpac})` // Yellow/Gold for Repel
                  : h.isOpen ? `rgba(0, 255, 255, ${maxColorOpac})`      // Cyan for Anti-Gravity
                  : `rgba(150, 150, 255, ${maxColorOpac})`;              // Neutral Blue
                  
        grad.addColorStop(0, color);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.arc(h.x, h.y, 120, 0, Math.PI*2);
        ctx.fill();
      });

      // Draw connection arc if two hands
      if (smoothedHands.length === 2) {
        ctx.beginPath();
        ctx.moveTo(smoothedHands[0].x, smoothedHands[0].y);
        ctx.lineTo(smoothedHands[1].x, smoothedHands[1].y);
        let grad = ctx.createLinearGradient(smoothedHands[0].x, smoothedHands[0].y, smoothedHands[1].x, smoothedHands[1].y);
        grad.addColorStop(0, 'rgba(0, 255, 255, 0)');
        grad.addColorStop(0.5, 'rgba(0, 255, 255, 0.4)');
        grad.addColorStop(1, 'rgba(0, 255, 255, 0)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      // Update and Draw Particles
      particles.forEach(p => {
        p.update(smoothedHands);
        p.draw();
      });
      
      requestAnimationFrame(drawLoop);
    }
    
    // Kick off render loop
    requestAnimationFrame(drawLoop);

    // AI Core Setup
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.65
    });

    hands.onResults((results) => {
        if (!isMediaPipeLoaded) {
            isMediaPipeLoaded = true;
            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 500);
            alignVideoMapping(); // Readjust strict real video data dynamically
        }
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            processHands(results.multiHandLandmarks);
        } else {
            smoothedHands = []; // No hands
        }
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    
    camera.start().catch((err) => {
        console.error("Camera denied or failed to load:", err);
        loading.innerText = "Camera Access Denied or Unavailable.";
        loading.style.color = "#ff5555";
    });

  </script>
</body>
</html>
