<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ribbon Bow Creator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(255, 170, 220, 0.14), transparent 30%),
                radial-gradient(circle at bottom right, rgba(180, 160, 255, 0.12), transparent 32%),
                linear-gradient(180deg, #120818 0%, #1a0d23 45%, #0d0614 100%);
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            color: #fff1fb;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        #hud {
            position: absolute;
            top: 18px;
            left: 18px;
            max-width: 340px;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid rgba(255, 215, 240, 0.22);
            background: rgba(34, 13, 36, 0.42);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 28px rgba(255, 120, 210, 0.08);
            z-index: 10;
        }

        #hud h1 {
            font-size: 16px;
            margin-bottom: 8px;
            letter-spacing: 0.8px;
            color: #fff7fc;
        }

        #hud p {
            font-size: 13px;
            line-height: 1.55;
            color: rgba(255, 237, 248, 0.9);
        }

        #hud .accent {
            color: #ff9adf;
            font-weight: 700;
        }

        #badge {
            position: absolute;
            top: 18px;
            right: 18px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 215, 240, 0.22);
            background: rgba(34, 13, 36, 0.40);
            color: #ffd7ef;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div id="hud">
        <h1>Ribbon Bow Creator</h1>
        <p>
            Draw graceful loops with your mouse. When your stroke curves into a soft bow-like motion,
            glowing ribbon shapes bloom on screen.
            <span class="accent">Click + drag</span> to draw,
            <span class="accent">press C</span> to clear,
            <span class="accent">press B</span> to drop a bow at the center.
        </p>
    </div>

    <div id="badge">mode: satin pink ribbon</div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        let w = canvas.width = innerWidth;
        let h = canvas.height = innerHeight;

        const pointer = {
            x: w * 0.5,
            y: h * 0.5,
            down: false
        };

        let currentStroke = [];
        const strokes = [];
        const bows = [];
        const sparkles = [];
        const bgStars = [];

        function resize() {
            w = canvas.width = innerWidth;
            h = canvas.height = innerHeight;
            createStars();
        }
        addEventListener("resize", resize);

        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        function createStars() {
            bgStars.length = 0;
            const count = Math.floor((w * h) / 13000);
            for (let i = 0; i < count; i++) {
                bgStars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: rand(0.5, 1.6),
                    a: rand(0.12, 0.75),
                    tw: rand(0.002, 0.012)
                });
            }
        }
        createStars();

        class Sparkle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = rand(-2.2, 2.2);
                this.vy = rand(-2.2, 2.2);
                this.life = rand(30, 70);
                this.maxLife = this.life;
                this.size = rand(1.2, 3);
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life--;
            }

            draw() {
                const a = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = a;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.life * 0.05);
                ctx.strokeStyle = this.color;
                ctx.shadowBlur = 14;
                ctx.shadowColor = this.color;
                ctx.lineWidth = 1.1;
                ctx.beginPath();
                ctx.moveTo(-this.size, 0);
                ctx.lineTo(this.size, 0);
                ctx.moveTo(0, -this.size);
                ctx.lineTo(0, this.size);
                ctx.stroke();
                ctx.restore();
            }
        }

        class Bow {
            constructor(x, y, size, hueShift = 0) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.scale = 0.5;
                this.targetScale = 1;
                this.alpha = 0;
                this.rotation = rand(-0.25, 0.25);
                this.float = rand(0, Math.PI * 2);
                this.hueShift = hueShift;
            }

            update() {
                this.scale += (this.targetScale - this.scale) * 0.08;
                this.alpha += (1 - this.alpha) * 0.06;
                this.float += 0.02;
            }

            drawRibbonLoop(offsetX, flip = 1) {
                const s = this.size;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(
                    offsetX * 0.3, -s * 0.26,
                    offsetX * 0.95, -s * 0.32 * flip,
                    offsetX, 0
                );
                ctx.bezierCurveTo(
                    offsetX * 0.95, s * 0.32 * flip,
                    offsetX * 0.3, s * 0.26,
                    0, 0
                );
                ctx.closePath();
            }

            drawTail(offsetX) {
                const s = this.size;
                ctx.beginPath();
                ctx.moveTo(offsetX, s * 0.08);
                ctx.bezierCurveTo(
                    offsetX + s * 0.10, s * 0.45,
                    offsetX - s * 0.16, s * 0.92,
                    offsetX - s * 0.05, s * 1.25
                );
                ctx.lineTo(offsetX + s * 0.10, s * 1.18);
                ctx.lineTo(offsetX + s * 0.02, s * 0.78);
                ctx.lineTo(offsetX + s * 0.24, s * 0.90);
                ctx.closePath();
            }

            fillRibbonShape(pathDrawer, gradientStops) {
                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = gradientStops.shadow;
                const grad = ctx.createLinearGradient(-this.size, -this.size, this.size, this.size);
                gradientStops.stops.forEach(stop => grad.addColorStop(stop[0], stop[1]));
                ctx.fillStyle = grad;
                pathDrawer();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = gradientStops.stroke;
                ctx.lineWidth = 1.2;
                pathDrawer();
                ctx.stroke();
                ctx.restore();
            }

            draw() {
                const bob = Math.sin(this.float) * 4;

                ctx.save();
                ctx.translate(this.x, this.y + bob);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                ctx.globalAlpha = this.alpha;

                const s = this.size;

                const leftLoop = {
                    shadow: "rgba(255, 120, 210, 0.55)",
                    stroke: "rgba(255, 240, 248, 0.75)",
                    stops: [
                        [0, "rgba(255, 178, 228, 0.98)"],
                        [0.45, "rgba(255, 110, 196, 0.98)"],
                        [1, "rgba(210, 120, 255, 0.95)"]
                    ]
                };

                const rightLoop = {
                    shadow: "rgba(180, 170, 255, 0.5)",
                    stroke: "rgba(255, 245, 252, 0.78)",
                    stops: [
                        [0, "rgba(255, 210, 242, 0.98)"],
                        [0.5, "rgba(244, 145, 221, 0.98)"],
                        [1, "rgba(170, 205, 255, 0.95)"]
                    ]
                };

                const tailFill = {
                    shadow: "rgba(255, 145, 220, 0.48)",
                    stroke: "rgba(255, 242, 250, 0.68)",
                    stops: [
                        [0, "rgba(255, 185, 234, 0.96)"],
                        [0.55, "rgba(246, 135, 205, 0.96)"],
                        [1, "rgba(196, 160, 255, 0.92)"]
                    ]
                };

                this.fillRibbonShape(() => this.drawRibbonLoop(-s, 1), leftLoop);
                this.fillRibbonShape(() => this.drawRibbonLoop(s, -1), rightLoop);
                this.fillRibbonShape(() => this.drawTail(-s * 0.16), tailFill);
                this.fillRibbonShape(() => this.drawTail(s * 0.16), tailFill);

                ctx.save();
                ctx.shadowBlur = 16;
                ctx.shadowColor = "rgba(255, 225, 245, 0.65)";
                const knotGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.22);
                knotGrad.addColorStop(0, "rgba(255, 250, 253, 0.98)");
                knotGrad.addColorStop(0.45, "rgba(255, 185, 228, 0.98)");
                knotGrad.addColorStop(1, "rgba(243, 125, 201, 0.95)");
                ctx.fillStyle = knotGrad;
                ctx.beginPath();
                ctx.ellipse(0, 0, s * 0.22, s * 0.16, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                ctx.restore();
            }
        }

        function addBow(x, y, size = rand(42, 78)) {
            bows.push(new Bow(x, y, size));
            for (let i = 0; i < 18; i++) {
                sparkles.push(new Sparkle(x + rand(-12, 12), y + rand(-12, 12), i % 2 ? "#ffb7e8" : "#d9b8ff"));
            }
        }

        function drawBackground(time) {
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, "#14091a");
            grad.addColorStop(0.5, "#1a0d23");
            grad.addColorStop(1, "#0d0614");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            const glow1 = ctx.createRadialGradient(w * 0.18, h * 0.18, 0, w * 0.18, h * 0.18, 260);
            glow1.addColorStop(0, "rgba(255, 145, 210, 0.10)");
            glow1.addColorStop(1, "rgba(255, 145, 210, 0)");
            ctx.fillStyle = glow1;
            ctx.fillRect(0, 0, w, h);

            const glow2 = ctx.createRadialGradient(w * 0.78, h * 0.74, 0, w * 0.78, h * 0.74, 300);
            glow2.addColorStop(0, "rgba(175, 160, 255, 0.09)");
            glow2.addColorStop(1, "rgba(175, 160, 255, 0)");
            ctx.fillStyle = glow2;
            ctx.fillRect(0, 0, w, h);

            for (const s of bgStars) {
                const alpha = s.a + Math.sin(time * s.tw + s.x * 0.01) * 0.12;
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 242, 250, ${Math.max(0.04, alpha)})`;
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawStrokePreview() {
            if (currentStroke.length < 2) return;

            ctx.save();
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.shadowBlur = 14;
            ctx.shadowColor = "rgba(255, 150, 218, 0.45)";

            for (let i = 1; i < currentStroke.length; i++) {
                const p1 = currentStroke[i - 1];
                const p2 = currentStroke[i];
                const t = i / currentStroke.length;
                const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                grad.addColorStop(0, `rgba(255, 180, 230, ${0.25 + t * 0.35})`);
                grad.addColorStop(1, `rgba(210, 185, 255, ${0.2 + t * 0.4})`);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2 + t * 7;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }

            ctx.restore();
        }

        function detectBowGesture(points) {
            if (points.length < 20) return null;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const p of points) {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            }

            const width = maxX - minX;
            const height = maxY - minY;
            if (width < 70 || height < 35) return null;

            const start = points[0];
            const mid = points[Math.floor(points.length / 2)];
            const end = points[points.length - 1];

            const horizontalReturn = Math.abs(start.x - end.x) < width * 0.45;
            const bowSpread = Math.abs(mid.x - start.x) > width * 0.2 || Math.abs(mid.x - end.x) > width * 0.2;
            const verticalCurve = Math.abs(mid.y - ((start.y + end.y) / 2)) > height * 0.12;

            if (horizontalReturn && bowSpread && verticalCurve) {
                return {
                    x: (minX + maxX) / 2,
                    y: (minY + maxY) / 2,
                    size: Math.max(36, Math.min(90, width * 0.33 + height * 0.28))
                };
            }
            return null;
        }

        canvas.addEventListener("mousedown", (e) => {
            pointer.down = true;
            currentStroke = [{ x: e.clientX, y: e.clientY }];
        });

        canvas.addEventListener("mousemove", (e) => {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            if (!pointer.down) return;
            currentStroke.push({ x: e.clientX, y: e.clientY });
            if (currentStroke.length > 120) currentStroke.shift();
        });

        addEventListener("mouseup", () => {
            if (pointer.down) {
                const bow = detectBowGesture(currentStroke);
                if (bow) {
                    addBow(bow.x, bow.y, bow.size);
                } else if (currentStroke.length > 8) {
                    const last = currentStroke[currentStroke.length - 1];
                    addBow(last.x, last.y, rand(34, 56));
                }
            }
            pointer.down = false;
            currentStroke = [];
        });

        addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if (key === "c") {
                bows.length = 0;
                sparkles.length = 0;
                strokes.length = 0;
                currentStroke = [];
            }
            if (key === "b") {
                addBow(w / 2, h / 2, rand(52, 82));
            }
        });

        function drawPointerGlow() {
            const g = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, 70);
            g.addColorStop(0, "rgba(255, 180, 230, 0.18)");
            g.addColorStop(1, "rgba(255, 180, 230, 0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(pointer.x, pointer.y, 70, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.shadowBlur = 18;
            ctx.shadowColor = "rgba(255, 220, 240, 0.8)";
            ctx.fillStyle = "#fff4fb";
            ctx.beginPath();
            ctx.arc(pointer.x, pointer.y, 3.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function animate(time = 0) {
            drawBackground(time);

            drawStrokePreview();

            for (const bow of bows) {
                bow.update();
                bow.draw();
            }

            for (let i = sparkles.length - 1; i >= 0; i--) {
                sparkles[i].update();
                sparkles[i].draw();
                if (sparkles[i].life <= 0) sparkles.splice(i, 1);
            }

            drawPointerGlow();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
