<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constellation Builder</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at top, rgba(30, 40, 80, 0.35), transparent 40%),
                linear-gradient(to bottom, #02030a 0%, #040816 55%, #02030a 100%);
            font-family: "Courier New", monospace;
            color: #bfefff;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #hud {
            position: absolute;
            top: 18px;
            left: 18px;
            padding: 12px 14px;
            border: 1px solid rgba(130, 220, 255, 0.28);
            background: rgba(5, 12, 28, 0.45);
            backdrop-filter: blur(6px);
            color: #d9f7ff;
            font-size: 13px;
            line-height: 1.6;
            letter-spacing: 0.5px;
            z-index: 10;
            box-shadow: 0 0 24px rgba(0, 180, 255, 0.08);
        }

        #hud .title {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        #hud .accent {
            color: #7de8ff;
        }

        #hint {
            position: absolute;
            right: 18px;
            bottom: 18px;
            padding: 10px 12px;
            border: 1px solid rgba(130, 220, 255, 0.2);
            background: rgba(5, 12, 28, 0.38);
            color: rgba(220, 245, 255, 0.85);
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div id="hud">
        <div class="title">CONSTELLATION BUILDER</div>
        <div><span class="accent">Click</span> to place stars</div>
        <div><span class="accent">Move mouse</span> to preview link</div>
        <div><span class="accent">C</span> clear lines + stars</div>
        <div><span class="accent">U</span> undo last star</div>
        <div><span class="accent">A</span> toggle auto-connect</div>
    </div>

    <div id="hint">Build your own star pattern across the sky.</div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        const stars = [];
        const backgroundStars = [];
        let mouse = { x: w / 2, y: h / 2 };
        let autoConnect = true;
        let pulse = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            createBackgroundStars();
        }

        window.addEventListener("resize", resize);

        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        function dist(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function createBackgroundStars() {
            backgroundStars.length = 0;
            const count = Math.floor((w * h) / 9000);
            for (let i = 0; i < count; i++) {
                backgroundStars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: rand(0.4, 1.8),
                    alpha: rand(0.15, 0.95),
                    twinkle: rand(0.005, 0.03)
                });
            }
        }

        createBackgroundStars();

        function addStar(x, y) {
            stars.push({
                x,
                y,
                r: rand(2.5, 4.8),
                glow: rand(10, 18)
            });
        }

        canvas.addEventListener("mousemove", (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener("click", (e) => {
            addStar(e.clientX, e.clientY);
        });

        window.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if (key === "c") stars.length = 0;
            if (key === "u") stars.pop();
            if (key === "a") autoConnect = !autoConnect;
        });

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, "#040816");
            grad.addColorStop(0.55, "#020610");
            grad.addColorStop(1, "#010208");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            for (const s of backgroundStars) {
                const flicker = Math.sin(pulse * s.twinkle * 100) * 0.15;
                ctx.beginPath();
                ctx.fillStyle = `rgba(220,240,255,${Math.max(0.05, s.alpha + flicker)})`;
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawNebulaGlow() {
            const spots = [
                { x: w * 0.2, y: h * 0.25, color: "rgba(90,120,255,0.06)", r: 220 },
                { x: w * 0.75, y: h * 0.3, color: "rgba(120,255,230,0.05)", r: 260 },
                { x: w * 0.5, y: h * 0.75, color: "rgba(160,120,255,0.04)", r: 300 }
            ];

            for (const spot of spots) {
                const g = ctx.createRadialGradient(spot.x, spot.y, 0, spot.x, spot.y, spot.r);
                g.addColorStop(0, spot.color);
                g.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(spot.x, spot.y, spot.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawConstellationLines() {
            if (stars.length < 2) return;

            ctx.save();
            ctx.shadowBlur = 18;
            ctx.shadowColor = "rgba(130,220,255,0.6)";

            ctx.lineWidth = 1.4;
            ctx.strokeStyle = "rgba(140,220,255,0.7)";
            ctx.beginPath();

            if (autoConnect) {
                ctx.moveTo(stars[0].x, stars[0].y);
                for (let i = 1; i < stars.length; i++) {
                    ctx.lineTo(stars[i].x, stars[i].y);
                }
            } else {
                for (let i = 0; i < stars.length - 1; i += 2) {
                    ctx.moveTo(stars[i].x, stars[i].y);
                    ctx.lineTo(stars[i + 1].x, stars[i + 1].y);
                }
            }

            ctx.stroke();
            ctx.restore();
        }

        function drawProximityMesh() {
            ctx.save();
            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    const d = dist(stars[i], stars[j]);
                    if (d < 160) {
                        const alpha = 1 - d / 160;
                        ctx.strokeStyle = `rgba(120,190,255,${alpha * 0.15})`;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(stars[i].x, stars[i].y);
                        ctx.lineTo(stars[j].x, stars[j].y);
                        ctx.stroke();
                    }
                }
            }
            ctx.restore();
        }

        function drawPreviewLine() {
            if (!stars.length) return;

            const last = stars[stars.length - 1];
            ctx.save();
            ctx.setLineDash([6, 8]);
            ctx.strokeStyle = "rgba(180,240,255,0.35)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(last.x, last.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
            ctx.restore();
        }

        function drawStars() {
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                const tw = 1 + Math.sin(pulse * 2 + i * 0.6) * 0.12;

                ctx.save();
                ctx.shadowBlur = s.glow;
                ctx.shadowColor = "rgba(180,235,255,0.95)";
                ctx.beginPath();
                ctx.fillStyle = "#eefbff";
                ctx.arc(s.x, s.y, s.r * tw, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.strokeStyle = "rgba(180,235,255,0.16)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r * 3.1, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        function drawMouseAura() {
            const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 80);
            g.addColorStop(0, "rgba(140,220,255,0.14)");
            g.addColorStop(1, "rgba(140,220,255,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 80, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            pulse += 0.01;
            drawBackground();
            drawNebulaGlow();
            drawProximityMesh();
            drawConstellationLines();
            drawPreviewLine();
            drawMouseAura();
            drawStars();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
